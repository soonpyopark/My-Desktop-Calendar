<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>My Desktop Calendar — embed test</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    /* Deliberately bright/saturated and distinct from any typical wallpaper so the
       embedded surface is trivially easy to spot on the desktop. */
    background: linear-gradient(135deg, #ff5f6d, #ffc371);
    color: #1a1a1a;
    user-select: none;
    -webkit-user-select: none;
  }

  .frame {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border: 4px solid rgba(0, 0, 0, 0.35);
  }

  /*
    WebView2's native non-client-region support (host enables it via
    CoreWebView2Settings.IsNonClientRegionSupportEnabled — see DesktopHostWindow.InitWebViewAsync).
    Purely behavioral, draws nothing — so this is how the window becomes draggable-by-content
    without adding any visible title bar, keeping embedded and floating pixel-identical.
    Only turned on while floating (see the "floating"/"embedded" message handler below).
  */
  .frame.draggable {
    app-region: drag;
  }

  #clickButton, #insertButton, .insert-popup {
    /* Stays clickable/typeable even inside a draggable frame. */
    app-region: no-drag;
  }

  .button-row {
    display: flex;
    gap: 10px;
  }

  /*
    xdiary's own date-cell entry (live-captured: a small xUIWindow pops up right where the
    cell was clicked, an IME attaches to it while typing, then it hides again once committed)
    reproduced here as a plain HTML popup instead of a second native window — same shape:
    opens anchored to the triggering point, takes text input, commits + closes on Enter/blur.
  */
  .insert-popup {
    position: fixed;
    display: none;
    background: #1a1a1a;
    border-radius: 8px;
    padding: 6px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.45);
    z-index: 10;
  }

  .insert-popup.visible {
    display: block;
  }

  .insert-popup input {
    font-size: 14px;
    padding: 6px 8px;
    border-radius: 6px;
    border: none;
    outline: none;
    width: 170px;
    background: #ffffff;
    color: #1a1a1a;
  }

  .entries {
    font-size: 12px;
    max-width: 320px;
    max-height: 64px;
    overflow-y: auto;
    text-align: center;
    opacity: 0.9;
  }

  .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  .clock {
    font-size: 40px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    /* If this ever stalls or the whole surface goes gray/blank while embedded, that IS
       the flicker/freeze bug this project exists to avoid re-introducing. */
  }

  .hint {
    font-size: 12px;
    opacity: 0.75;
    max-width: 320px;
    text-align: center;
  }

  button {
    font-size: 16px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: #1a1a1a;
    color: #ffc371;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  .counter {
    font-size: 13px;
    font-weight: 600;
  }

  .flash {
    animation: flash 0.4s ease-out;
  }

  @keyframes flash {
    from { background-color: #ffffff; }
    to { background-color: transparent; }
  }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="title">MY DESKTOP CALENDAR — EMBED TEST</div>
    <div class="clock" id="clock">--:--:--</div>
    <!--
      Pure client-side click counter — no native bridge round-trip. This page never talks
      to a click-zone-polling subsystem (there isn't one in this project). If clicking this
      button on the real desktop increments the counter, real WM_LBUTTONDOWN input is
      reaching this WebView2 surface through whatever parent DesktopEmbedService attached
      it to (SysListView32 or the Progman-raised fallback) — see the diagnostics log for
      which one is active.
    -->
    <div class="button-row">
      <button id="clickButton" type="button">Click me</button>
      <button id="insertButton" type="button">Insert me</button>
    </div>
    <div class="counter" id="counter">Clicks: 0</div>
    <div class="entries" id="entries"></div>
    <div class="hint">
      Watch the clock for gray flashes/freezes. Click the button directly on the desktop —
      if the counter never moves, clicks are still being swallowed by the shell.
    </div>
  </div>

  <!--
    Anchored near "Insert me" when opened (see openInsertPopup) — mirrors xdiary's own
    date-cell editor popping up right at the click point instead of a fixed dialog location.
  -->
  <div class="insert-popup" id="insertPopup">
    <input type="text" id="insertInput" placeholder="Type a value…" />
  </div>

  <script>
    const clockEl = document.getElementById('clock');
    function tick() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);

    let clicks = 0;
    const counterEl = document.getElementById('counter');
    const frameEl = document.getElementById('frame');
    document.getElementById('clickButton').addEventListener('click', () => {
      clicks += 1;
      counterEl.textContent = `Clicks: ${clicks}`;
      frameEl.classList.remove('flash');
      // restart the flash animation even on rapid repeated clicks
      void frameEl.offsetWidth;
      frameEl.classList.add('flash');
    });

    // "Insert me" — value entry modeled on xdiary's own date-cell editor (live-captured: a
    // small popup opens right at the click point, takes typed/IME text, then commits + closes
    // on Enter or focus-out). Reproduced here as a plain HTML input instead of a second native
    // window, but the same open-at-click-point / type / commit-and-close shape.
    const insertButton = document.getElementById('insertButton');
    const insertPopup = document.getElementById('insertPopup');
    const insertInput = document.getElementById('insertInput');
    const entriesEl = document.getElementById('entries');
    let entries = [];

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function renderEntries() {
      entriesEl.innerHTML = entries.map((v) => `<div>• ${escapeHtml(v)}</div>`).join('');
    }

    function openInsertPopup() {
      const rect = insertButton.getBoundingClientRect();
      insertPopup.style.left = `${rect.left}px`;
      insertPopup.style.top = `${rect.bottom + 6}px`;
      insertPopup.classList.add('visible');
      insertInput.value = '';
      insertInput.focus();
    }

    function closeInsertPopup(commit) {
      if (!insertPopup.classList.contains('visible')) {
        // Already closed — avoids double-committing when both the Enter/Escape handler and
        // the resulting blur event try to close it.
        return;
      }

      insertPopup.classList.remove('visible');
      if (commit) {
        const value = insertInput.value.trim();
        if (value) {
          entries.unshift(value);
          entries = entries.slice(0, 5);
          renderEntries();
        }
      }
    }

    insertButton.addEventListener('click', () => {
      if (insertPopup.classList.contains('visible')) {
        closeInsertPopup(false);
      } else {
        openInsertPopup();
      }
    });

    insertInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        closeInsertPopup(true);
      } else if (e.key === 'Escape') {
        closeInsertPopup(false);
      }
    });

    // Commits on click-away too, same as xdiary's editor closing (and saving) as soon as
    // focus leaves it, not just on Enter.
    insertInput.addEventListener('blur', () => closeInsertPopup(true));

    // Host (DesktopHostWindow.PrepareForFloating/PrepareForEmbedding) tells us which state
    // we're in via PostWebMessageAsString. Only floating gets the draggable region — an
    // embedded (SetParent'd into the desktop shell) window shouldn't be moved this way.
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', (event) => {
        if (event.data === 'floating') {
          frameEl.classList.add('draggable');
        } else if (event.data === 'embedded') {
          frameEl.classList.remove('draggable');
        }
      });
    }
  </script>
</body>
</html>
