<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>My Desktop Calendar — embed test</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Segoe UI", sans-serif;
    /* Deliberately bright/saturated and distinct from any typical wallpaper so the
       embedded surface is trivially easy to spot on the desktop. */
    background: linear-gradient(135deg, #ff5f6d, #ffc371);
    color: #1a1a1a;
    user-select: none;
    -webkit-user-select: none;
  }

  .frame {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border: 4px solid rgba(0, 0, 0, 0.35);
  }

  /*
    WebView2's native non-client-region support (host enables it via
    CoreWebView2Settings.IsNonClientRegionSupportEnabled — see DesktopHostWindow.InitWebViewAsync).
    Purely behavioral, draws nothing — so this is how the window becomes draggable-by-content
    without adding any visible title bar, keeping embedded and floating pixel-identical.
    Only turned on while floating (see the "floating"/"embedded" message handler below).
  */
  .frame.draggable {
    app-region: drag;
  }

  #clickButton {
    /* Stays clickable even inside a draggable frame. */
    app-region: no-drag;
  }

  .title {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  .clock {
    font-size: 40px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    /* If this ever stalls or the whole surface goes gray/blank while embedded, that IS
       the flicker/freeze bug this project exists to avoid re-introducing. */
  }

  .hint {
    font-size: 12px;
    opacity: 0.75;
    max-width: 320px;
    text-align: center;
  }

  button {
    font-size: 16px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    background: #1a1a1a;
    color: #ffc371;
    cursor: pointer;
  }

  button:active {
    transform: scale(0.97);
  }

  .counter {
    font-size: 13px;
    font-weight: 600;
  }

  .flash {
    animation: flash 0.4s ease-out;
  }

  @keyframes flash {
    from { background-color: #ffffff; }
    to { background-color: transparent; }
  }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="title">MY DESKTOP CALENDAR — EMBED TEST</div>
    <div class="clock" id="clock">--:--:--</div>
    <!--
      Pure client-side click counter — no native bridge round-trip. This page never talks
      to a click-zone-polling subsystem (there isn't one in this project). If clicking this
      button on the real desktop increments the counter, real WM_LBUTTONDOWN input is
      reaching this WebView2 surface through whatever parent DesktopEmbedService attached
      it to (SysListView32 or the Progman-raised fallback) — see the diagnostics log for
      which one is active.
    -->
    <button id="clickButton" type="button">Click me</button>
    <div class="counter" id="counter">Clicks: 0</div>
    <div class="hint">
      Watch the clock for gray flashes/freezes. Click the button directly on the desktop —
      if the counter never moves, clicks are still being swallowed by the shell.
    </div>
  </div>

  <script>
    const clockEl = document.getElementById('clock');
    function tick() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    }
    tick();
    setInterval(tick, 1000);

    let clicks = 0;
    const counterEl = document.getElementById('counter');
    const frameEl = document.getElementById('frame');
    document.getElementById('clickButton').addEventListener('click', () => {
      clicks += 1;
      counterEl.textContent = `Clicks: ${clicks}`;
      frameEl.classList.remove('flash');
      // restart the flash animation even on rapid repeated clicks
      void frameEl.offsetWidth;
      frameEl.classList.add('flash');
    });

    // Host (DesktopHostWindow.PrepareForFloating/PrepareForEmbedding) tells us which state
    // we're in via PostWebMessageAsString. Only floating gets the draggable region — an
    // embedded (WS_CHILD, parented into the desktop) window shouldn't be moved this way.
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener('message', (event) => {
        if (event.data === 'floating') {
          frameEl.classList.add('draggable');
        } else if (event.data === 'embedded') {
          frameEl.classList.remove('draggable');
        }
      });
    }
  </script>
</body>
</html>
