<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Desktop Calendar</title>
    <script>
      (function () {
        try {
          var key = 'mycalendar.colorScheme';
          var effKey = 'mycalendar.colorSchemeEffective';
          var mode = localStorage.getItem(key) || 'light';
          var dark =
            mode === 'dark' ||
            (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) ||
            (mode !== 'light' && mode !== 'system' && localStorage.getItem(effKey) === 'dark');
          if (mode === 'light') dark = false;
          var bg = dark ? '#202124' : '#eef0f2';
          var fg = dark ? '#bdc1c6' : '#70757a';
          var soft = dark ? '#292a2d' : '#e8f0fe';
          document.documentElement.classList.toggle('dark', dark);
          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
          document.documentElement.style.backgroundColor = bg;
          document.documentElement.dataset.bootTheme = dark ? 'dark' : 'light';
          window.__MYCAL_BOOT_THEME__ = { dark: dark, bg: bg, fg: fg, soft: soft };
        } catch (e) {
          window.__MYCAL_BOOT_THEME__ = { dark: false, bg: '#eef0f2', fg: '#70757a', soft: '#e8f0fe' };
        }
      })();
    </script>
    <style>
      html, body, #root {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #eef0f2;
      }
      html.dark, html.dark body, html.dark #root {
        background: #202124;
      }
    </style>
    <link rel="icon" href="/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon.png" />
  </head>
  <body>
    <div id="root">
      <div id="boot-splash" style="display:grid;height:100%;place-content:center;gap:12px;justify-items:center;font-family:'Segoe UI','Malgun Gothic',sans-serif">
        <img src="/icon.png" alt="" width="56" height="56" style="display:block;object-fit:contain" />
        <div>캘린더 불러오는 중…</div>
      </div>
    </div>
    <script>
      (function () {
        var t = window.__MYCAL_BOOT_THEME__ || { bg: '#ffffff', fg: '#70757a', soft: '#e8f0fe' };
        var el = document.getElementById('boot-splash');
        if (!el) return;
        el.style.background = t.soft;
        el.style.color = t.fg;
        document.body.style.backgroundColor = t.bg;
      })();
    </script>
    <script src="/desktop-bridge.js"></script>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
